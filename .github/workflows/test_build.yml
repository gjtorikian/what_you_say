name: Test Build

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "lib/what_you_say/version.rb"

jobs:
  build:
    uses: gjtorikian/actions/.github/workflows/ruby_rust_test_build.yml@main
    secrets:
      gh_token: ${{ secrets.GITHUB_TOKEN }}
    with:
      include_musl: true
      supported_ruby_versions: "3.3,3.4,4.0"
